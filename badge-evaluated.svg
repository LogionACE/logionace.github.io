<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" width="200" height="240">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#161b22"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f8cff"/>
      <stop offset="100%" stop-color="#3b6fcc"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Shield shape -->
  <path d="M100 8 L185 45 L185 140 Q185 185 100 228 Q15 185 15 140 L15 45 Z"
        fill="url(#bgGrad)"
        stroke="#30363d"
        stroke-width="2"/>

  <!-- Inner border accent -->
  <path d="M100 18 L176 51 L176 138 Q176 179 100 218 Q24 179 24 138 L24 51 Z"
        fill="none"
        stroke="#4f8cff"
        stroke-width="0.5"
        opacity="0.4"/>

  <!-- Top accent line -->
  <path d="M60 60 L140 60"
        stroke="url(#accentGrad)"
        stroke-width="1.5"
        stroke-linecap="round"/>

  <!-- "EVALUATED BY" text -->
  <text x="100" y="82"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="11"
        font-weight="500"
        letter-spacing="2.5"
        fill="#8b949e"
        text-anchor="middle">EVALUATED BY</text>

  <!-- "Logion" text -->
  <text x="100" y="115"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="26"
        font-weight="700"
        fill="#ffffff"
        text-anchor="middle">Logion</text>

  <!-- "ACE" text with accent color -->
  <text x="100" y="145"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="22"
        font-weight="800"
        letter-spacing="4"
        fill="#4f8cff"
        text-anchor="middle"
        filter="url(#glow)">ACE</text>

  <!-- Checkmark circle -->
  <circle cx="100" cy="176" r="14"
          fill="none"
          stroke="#4f8cff"
          stroke-width="1.5"/>
  <path d="M91 176 L97 182 L109 170"
        fill="none"
        stroke="#4f8cff"
        stroke-width="2.5"
        stroke-linecap="round"
        stroke-linejoin="round"/>

  <!-- Bottom accent line -->
  <path d="M70 200 L130 200"
        stroke="url(#accentGrad)"
        stroke-width="1.5"
        stroke-linecap="round"/>
</svg>
